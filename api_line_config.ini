# API Line Art extraction config.
# Prebuilt packages read this file from the package root.
# Fill the Required section with your own relay settings before running extraction.

# provider:
#   auto: Try responses_image -> openai_compatible -> chat_image automatically.
#   responses_image: POST /responses with JSON + base64 input image.
#   openai_compatible: POST /images/edits with multipart image upload.
#   chat_image: POST /chat/completions with stream=true; useful for AIGCBar-style relays.
provider=openai_compatible

# base_url:
#   The relay root URL, usually ending in /v1.
#   Example: https://api.example.com/v1
base_url=

# api_key:
#   Your relay token. Leave empty if you prefer api_key_env below.
api_key=

# model:
#   The image-edit or image-to-image model name shown by your relay.
model=gpt-image-1.5

# provider_order:
#   Optional fallback order separated by | or ,. Default is responses_image|openai_compatible|chat_image.
provider_order=openai_compatible

# endpoint:
#   OpenAI-compatible image edit relays usually use /images/edits.
endpoint=/images/edits

# image_generate_endpoint:
#   Optional fallback endpoint for image generation style relays.
image_generate_endpoint=/images/generations

# responses_endpoint:
#   Used only when provider=responses_image.
responses_endpoint=/responses

# chat_endpoint:
#   Used only when provider=chat_image.
chat_endpoint=/chat/completions

# api_key_env:
#   Optional environment variable name. Used only when api_key is empty.
#   PowerShell example: $env:FOURIER_IMAGE_API_KEY="your-token"
api_key_env=FOURIER_IMAGE_API_KEY

# prompt:
#   Instruction sent to the model for line-art extraction.
prompt=Extract a clean black-and-white line drawing from the input image. Preserve the main contours and important internal lines. Use a white background and black lines only.

# size:
#   Output image size requested from the API.
size=1024x1024

# quality:
#   Optional image_generation quality for provider=responses_image.
#   Leave empty unless the relay documents accepted values.
quality=

# responses_action:
#   edit sends the input image to /responses; generate ignores the input image.
responses_action=edit

# response_format:
#   For GPT image models, leave this empty; they normally return base64 by default.
#   Older DALL-E-compatible relays may need b64_json.
response_format=b64_json

# timeout_seconds:
#   Increase this if the relay is slow.
timeout_seconds=600

# stream:
#   Keep true for slow relays. chat_image and compatible image edits can use streaming to avoid idle timeouts.
stream=false

# line_polarity:
#   dark_on_light means black lines on white background.
#   Use light_on_dark only if the API returns white lines on black background.
line_polarity=dark_on_light

# use_otsu:
#   Reserved for older thresholding. The current line extractor uses threshold directly.
use_otsu=false

# threshold:
#   For dark_on_light, pixels darker than this become line pixels.
threshold=220

# min_component_area:
#   Removes very tiny binary specks before SVG export.
min_component_area=8

# run_dft:
#   true also generates dft_data and FourierCoefficient outputs.
run_dft=true

# dft_modes:
#   sequential, simultaneous, full_svg, both, or all.
dft_modes=all

# primary_channel / channels:
#   Default output channel name for the API-generated line art.
primary_channel=API_Line
channels=API_Line

# image_field:
#   Multipart form field name for the uploaded image.
#   Current GPT image edit examples may use image[], but many relays require image.
image_field=image

# response_base64_key / response_url_key:
#   JSON keys used to find the returned image.
response_base64_key=b64_json
response_url_key=url

# Extra multipart fields or headers can be added when a relay requires them.
# form.quality=high
# header.X-Custom-Header=value
